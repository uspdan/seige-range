name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a branch is pushed twice in quick
# succession — the older run's signal is no longer load-bearing.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# CI test secrets — never used in real environments. Generated
# per-job via openssl in the "ci-env" step so the workflow file
# itself doesn't carry secret-shaped strings (R15 audit finding).
env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  backend-tests:
    name: backend — full test suite + coverage gate
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: siege
          POSTGRES_PASSWORD: siege_secret
          POSTGRES_DB: siege_range_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U siege"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: generate ephemeral CI test secret
        run: |
          # Match Settings.SECRET_KEY min_length=32 — generate per-job.
          echo "SECRET_KEY=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: run full test suite (unit + integration) with coverage gate
        working-directory: backend
        env:
          APP_ENV: test
          ADMIN_PASSWORD: CIAdminPasswordA1!
          ALLOWED_ORIGINS: http://localhost:3000
          DATABASE_URL: postgresql+asyncpg://siege:siege_secret@localhost:5432/siege_range_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          # Combined unit + integration run so the project-wide
          # 80% coverage gate from pytest.ini sees the full call
          # graph. Running them separately under the same gate
          # double-counts shared modules without covering the
          # ones only one tier exercises.
          python -m pytest tests/ -v

  frontend-build:
    name: frontend — vite build + lint
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: install (npm ci — exact lockfile)
        working-directory: frontend
        run: npm ci

      - name: lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: build
        working-directory: frontend
        run: npm run build

  python-deps-audit:
    name: deps-audit — pip-audit
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: install pip-audit
        run: pip install pip-audit

      - name: audit backend requirements
        # R13 / R14: fail on HIGH or CRITICAL findings. The
        # editable ``../packages/bluerange-spec`` line in
        # requirements-test.txt resolves relative to backend/, so
        # cd in first.
        #
        # Documented suppressions — re-audit each release:
        #
        # * PYSEC-2026-161 (starlette) — fix in 1.0.1; the
        #   fastapi 0.123 line we're on pins starlette<0.50.
        #   Will close when fastapi ships a release on
        #   starlette 1.x.
        # * CVE-2025-71176 (pytest 9.0.3) — dev-only, major bump
        #   with plugin breakages. Tracked.
        # * CVE-2026-0994 (protobuf 5.29.6) — opentelemetry-proto
        #   1.27 pins protobuf<5. Will close on OTel 1.30+ bump.
        # * CVE-2025-69872 (diskcache) — no upstream fix.
        #
        # R28 (PyJWT migration) closed:
        # * PYSEC-2025-185 (python-jose) — dep removed.
        # * CVE-2024-23342 (ecdsa)       — dep dropped (was
        #                                  transitive via jose).
        # * CVE-2026-30922 (pyasn1)      — dep dropped (was
        #                                  transitive via jose).
        working-directory: backend
        run: |
          pip-audit \
            --requirement requirements.txt \
            --requirement requirements-test.txt \
            --strict \
            --vulnerability-service osv \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln CVE-2025-71176 \
            --ignore-vuln CVE-2026-0994 \
            --ignore-vuln CVE-2025-69872

  frontend-deps-audit:
    name: deps-audit — npm audit
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: install
        working-directory: frontend
        run: npm ci

      - name: npm audit (high+ severity)
        working-directory: frontend
        run: npm audit --audit-level=high

  secret-scan:
    name: secret-scan — trufflehog
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: trufflehog (verified-only)
        uses: trufflesecurity/trufflehog@v3.81.10
        with:
          path: ./
          # Only verified secrets fail the build. Heuristic-only hits
          # become PR comments via the action's default behaviour.
          extra_args: --only-verified

  flag-leak-check:
    name: flag-leak — refuse cleartext CTF flags in tracked source
    runs-on: ubuntu-22.04
    timeout-minutes: 2

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: scan tracked files for ``CTF{...}`` literals
        run: |
          set -eu
          # Permit the redacted marker and the explicit template
          # placeholder. Anything else means cleartext flag back in
          # the tree — fail the build.
          # examples/ ships intentionally-leaky training artefacts
          # (pre-rendered memory dumps, sample evtx, etc.) for the
          # challenge-author tutorial. Out of scope for this gate —
          # tracked in docs/author-onboarding.md as a follow-up.
          if git grep -nE 'CTF\{[^}]+\}' \
              -- ':!*.flag.txt' ':!examples/' ':!docs/' \
                 ':!.claude/' \
                 ':!.github/workflows/ci.yml' \
              | grep -v 'CTF{REDACTED}' \
              | grep -v 'CTF{{REDACTED}}' \
              | grep -v 'CTF{EXAMPLE_flag_string}' \
              | grep -v 'CTF{<' ; then
            echo
            echo "::error::Cleartext CTF flag literal detected in tracked source."
            echo "::error::Flags must live under secrets/ and be staged via scripts/stage-answers.sh"
            exit 1
          fi
          echo "no cleartext CTF{...} literals in tracked source — ok"

  egg-info-check:
    name: egg-info — refuse tracked build artefacts
    runs-on: ubuntu-22.04
    timeout-minutes: 2

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: ensure backend/siege_backend.egg-info is not tracked
        # R31 audit finding — a previous packaging step had committed
        # the egg-info directory despite it being gitignored. Catch
        # any future regression in CI.
        run: |
          set -eu
          if git ls-files backend/siege_backend.egg-info | grep -q .; then
            echo "::error::backend/siege_backend.egg-info is tracked — it should be gitignored."
            git ls-files backend/siege_backend.egg-info
            exit 1
          fi
          echo "no tracked egg-info — ok"
