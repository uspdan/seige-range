# Per-instance sidecar tinyproxy configuration.
#
# Identical security envelope to the shared egress-proxy
# (Phase 9), with the filter file written by the entrypoint from
# the EGRESS_ALLOWLIST env var rather than mounted via a volume.

User tinyproxy
Group tinyproxy
Port 8888
Listen 0.0.0.0

PidFile "/var/run/tinyproxy/tinyproxy.pid"
LogLevel Info
LogFile  "/var/log/tinyproxy/tinyproxy.log"

Timeout 60
DefaultErrorFile "/usr/share/tinyproxy/default.html"

Filter "/etc/tinyproxy/egress-allowlist.conf"
FilterDefaultDeny Yes
FilterExtended On
FilterCaseSensitive No
FilterURLs Off

ConnectPort 443
ConnectPort 8443

# Tighter ceilings than the shared proxy: a single instance does not
# need 64 concurrent transit slots.
MaxClients 16
StartServers 1
MinSpareServers 1
MaxSpareServers 4
