# Phase 9 egress proxy configuration.
#
# Bind to 0.0.0.0 so the proxy is reachable on whichever bridge the
# launcher attaches us to. Network isolation (per-instance internal
# bridges connected only to this container) is the *real* boundary —
# this config is the policy layer on top.

User tinyproxy
Group tinyproxy
Port 8888
Listen 0.0.0.0

PidFile "/var/run/tinyproxy/tinyproxy.pid"
LogLevel Info
LogFile  "/var/log/tinyproxy/tinyproxy.log"

Timeout 60
DefaultErrorFile "/usr/share/tinyproxy/default.html"

# Hot-reload-friendly filter path. The api process writes the rendered
# union allowlist to /srv/egress/egress-allowlist.conf via a shared
# volume; the entrypoint touches the file on first boot if missing so
# tinyproxy does not crash when no instances have rendered yet. SIGHUP
# from app.services.orchestration.egress.signal_egress_reload tells
# tinyproxy to re-read.
Filter "/srv/egress/egress-allowlist.conf"
FilterDefaultDeny Yes
FilterExtended On
FilterCaseSensitive No
FilterURLs Off

# CONNECT for HTTPS to the standard TLS ports only. No raw TCP tunnels.
ConnectPort 443
ConnectPort 8443

# Hard ceiling on concurrent transit so a single instance can't exhaust
# the proxy.
MaxClients 64
StartServers 2
MinSpareServers 2
MaxSpareServers 8
