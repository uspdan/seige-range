[pytest]
testpaths = tests
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning:passlib.*
    ignore::DeprecationWarning:jose.*
addopts =
    -ra
    --strict-markers
    --strict-config
    --cov=app.services.auth
    --cov=app.services.scoring
    --cov=app.services.audit
    --cov=app.services.hints
    --cov=app.services.flag_submission
    --cov=app.services.challenge_browse
    --cov=app.services.challenge_loader
    --cov=app.services.flag_dispatch
    --cov=app.services.validator_registry
    --cov=app.services.validator_sandbox
    --cov=app.services.validator_subprocess_runner
    --cov=app.services.test_harness
    --cov=app.services.api_v1
    --cov=app.services.webhook_dispatch
    --cov=app.routers.v1
    --cov=app.validators
    --cov=app.routers.auth
    --cov=app.routers.challenges
    --cov=app.routers.admin
    --cov=app.routers.competitions
    --cov=app.routers.health
    --cov=app.routers.instances
    --cov=app.routers.leaderboard
    --cov=app.routers.notifications
    --cov=app.routers.stats
    --cov=app.routers.writeups
    --cov=app.security.seccomp
    --cov=app.services.orchestration
    --cov=app.services.scheduler
    --cov=app.services.ws_manager
    --cov-report=term-missing
    # Phase 12 (slice 12): project-wide gate bumped from the Phase 5
    # 60% floor to 80% per the Phase 0 commitment. Slices 1–11 left
    # the project at ~86%; the new gate locks in the margin.
    --cov-fail-under=80
markers =
    integration: tests that hit the testcontainer Postgres/Redis
    unit: in-process unit tests with no external deps (mocked docker, no DB)
