worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=flags:10m rate=10r/m;

    upstream dashboard_upstream {
        server dashboard:5173;
    }

    upstream api_upstream {
        server api:8000;
    }

    # Sprint 1 — TLS termination.
    #
    # Two server blocks:
    #   * :80   — redirects everything to HTTPS (except /health for
    #             external probes that don't speak TLS).
    #   * :443  — the real surface, with HSTS + a strict-ish CSP.
    #
    # Operators generate certs with ``scripts/generate_certs.sh``
    # for staging or drop in their Let's Encrypt / cert-manager
    # output. The bundle path matches the one the cert script
    # documents.
    #
    # In dev (``make dev``) we also keep the :80 surface live as the
    # everyday entry point so devs don't need self-signed-cert
    # browser warnings for every test loop. The dev compose
    # overrides the prod ``ports`` mapping back to "8080:80" only.

    # ────────────────────────────────────────────────────────────────
    # :80 — HTTP. In production this is a redirect-only listener.
    # In dev it proxies traffic directly (the include below is a
    # no-op when certs are absent).
    # ────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health probe stays on :80 so external uptime monitors
        # (which often only speak HTTP) can hit it without TLS.
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok","service":"nginx"}';
        }

        # If certs are present, redirect every other path to HTTPS.
        # If not (dev / staging without certs), fall through to the
        # proxy block. The trick: a separate file listing the cert
        # paths is included only when present; if it's there we
        # return 301 unconditionally.
        # The include lives in tls-redirect.conf which the
        # ``generate_certs.sh`` flow drops into ``nginx/`` after
        # creating the cert files.
        # Operators NOT running TLS can leave the file absent and
        # this block silently keeps proxying on port 80.
        include /etc/nginx/conf.d/tls-redirect.conf*;

        # Proxy fall-through (active when tls-redirect.conf is absent).
        # Mirrors the :443 server block below.
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location /api/auth/ {
            limit_req zone=auth burst=3 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/api/challenges/.+/submit$ {
            limit_req zone=flags burst=5 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket via the /api/ prefix (frontend hits /api/ws).
        location = /api/ws {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location /ws {
            rewrite ^/ws(.*)$ /ws$1 break;
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location / {
            proxy_pass http://dashboard_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ────────────────────────────────────────────────────────────────
    # :443 — TLS. Production traffic terminates here.
    # ────────────────────────────────────────────────────────────────
    server {
        # ``ssl`` keyword is the modern spelling; ``http2`` upgrades
        # multiplexed clients automatically.
        listen 443 ssl;
        http2 on;
        server_name _;

        # Cert paths match the ``scripts/generate_certs.sh`` output
        # and the docker-compose.prod.yml volume mount
        # (``./nginx/certs:/etc/nginx/certs:ro``). Operators using
        # Let's Encrypt mount their fullchain.pem / privkey.pem at
        # the same paths.
        ssl_certificate     /etc/nginx/certs/server-bundle.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # TLS 1.2 + 1.3 only; ECDHE ciphers; OCSP stapling.
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # REDACTED headers — everything the legacy block had plus
        # HSTS (1 year + preload-eligible) and a Permissions-Policy
        # that denies the gnarly browser APIs nothing on this site
        # uses.
        add_header Strict-Transport-REDACTED "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), gyroscope=()" always;

        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok","service":"nginx"}';
        }

        # API proxy
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Auth rate limiting (stricter)
        location /api/auth/ {
            limit_req zone=auth burst=3 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Flag submission rate limiting
        location ~ ^/api/challenges/.+/submit$ {
            limit_req zone=flags burst=5 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket via the /api/ prefix (frontend hits /api/ws).
        location = /api/ws {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # WebSocket proxy (TLS upgrade → wss://).
        location /ws {
            rewrite ^/ws(.*)$ /ws$1 break;
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Dashboard (frontend)
        location / {
            proxy_pass http://dashboard_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
