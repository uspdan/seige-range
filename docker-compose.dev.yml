services:
  nginx:
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro

  api:
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --workers 1
    environment:
      - LOG_LEVEL=debug

  dashboard:
    volumes:
      - ./frontend/src:/app/src

  db:
    ports:
      - "5433:5432"

  redis:
    ports:
      - "6380:6379"
