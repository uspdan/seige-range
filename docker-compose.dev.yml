services:
  nginx:
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    # nginx reaches the orchestrator's published 11000-11199
    # workstation port range via the host gateway — ttyd binds
    # inside DinD on 0.0.0.0:11000+uid, published by the
    # orchestrator to the host, hit from this container via the
    # ``host.docker.internal`` loopback alias.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  orchestrator:
    # Dev only — let DinD pull base images and resolve DNS so
    # ``scripts/build_challenge_images.sh`` can build the seed
    # challenge images. Production keeps siege-challenges internal
    # and expects images to arrive via a registry mirror.
    networks:
      siege-challenges:
      siege-egress:
    # Dev only — publish the launcher's port range to the host so
    # users can ``curl http://localhost:<port>`` against launched
    # challenges. Production routes via an ingress/proxy instead.
    #
    # 11000-11099 is the per-user analyst-workstation range — the
    # workstation service binds ttyd to ``11000+user_id`` so each
    # player gets a deterministic, browser-reachable web shell URL
    # at ``http://<host>:1100N/``. SSH lives on ``11100+user_id``.
    ports:
      - "10000-10049:10000-10049"
      - "11000-11099:11000-11099"
      - "11100-11199:11100-11199"

  api:
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --workers 1
    environment:
      - LOG_LEVEL=debug
      # Dev only — accept un-pinned challenge images. Production
      # leaves this true so Phase 9's digest enforcement still bites.
      - REQUIRE_IMAGE_DIGEST=false

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./frontend/src:/app/src
    environment:
      # Force vite to use polling for file events — bind-mounted
      # volumes don't always deliver inotify reliably on Linux hosts.
      - CHOKIDAR_USEPOLLING=true

  db:
    ports:
      - "5433:5432"

  redis:
    ports:
      - "6380:6379"
