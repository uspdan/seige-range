# ATT&CK TA0008 — Lateral Movement mini-campaign.
#
# Synthesised intrusion across five Windows hosts: WORK01 (foothold)
# → FILE01 → DC01 → DC02 → AUDIT01. Each hop demonstrates a
# distinct lateral-movement sub-technique. The hunter must walk
# the artefacts in order and name the technique used at each
# hop.

slug: tier-2-lateral-movement
title: "Tier 2: Lateral Movement"
description: |
  An attacker is moving inside a corporate Windows network. You have
  Sysmon ProcessCreate events, security event logs, and SMB session
  logs from five hosts. Reconstruct the lateral-movement chain and
  identify the technique used at each hop.
category: Threat Hunting
team: blue
difficulty: 3
points: 450
flag: "CTF{REDACTED}"
tactic_id: TA0008
docker_port: 2222
profile: default-strict

techniques:
  - id: T1021.001
    description: |
      Remote Desktop Protocol — attacker reuses a stolen credential
      to RDP from WORK01 into FILE01. REDACTED log shows EID 4624
      logon type 10.
    question:
      prompt: |
        Which protocol did the attacker use to move from WORK01 to FILE01?
        (One word, lowercase.)
      hint: |
        security.log on FILE01 — look for EID 4624 with LogonType=10.
      answer: rdp

  - id: T1021.002
    description: |
      SMB Admin Shares — attacker uses net use \\DC01\C$ to access
      the domain controller's hidden admin share.
    question:
      prompt: |
        What hidden SMB share name did the attacker access on DC01?
        (Format: <share name>, e.g. `C$`.)
      hint: |
        smb_session.log on DC01 — look for an unusual access from
        FILE01's machine account.
      answer: REDACTED

  - id: T1047
    description: |
      WMI Remote Execution — attacker uses wmic /node:DC02 process
      call create REDACTED to launch a process on a second DC.
    question:
      prompt: |
        Which Microsoft binary (lowercase, full filename) did the
        attacker invoke locally to spawn the remote process on DC02?
      hint: |
        Sysmon on the calling host shows the binary in
        `CommandLine`. Think classic WMI dual-use tool.
      answer: REDACTED

  - id: T1053.005
    description: |
      Scheduled Task / Job (At) — attacker uses schtasks /create
      /s AUDIT01 /tn ... to register a remote task on AUDIT01
      that runs as SYSTEM at next boot.
    question:
      prompt: |
        What is the name of the scheduled task the attacker created
        on AUDIT01? (Exact string, as logged.)
      hint: |
        Sysmon EID 1 / schtasks.exe with the /tn argument.
      answer: REDACTED

  - id: T1021.003
    description: |
      Distributed Component Object Model — attacker pivots from
      AUDIT01 back to FILE01 using REDACTED DCOM
      instantiation.
    question:
      prompt: |
        What DCOM ProgID did the attacker abuse for the final hop?
        (Lowercase, including the dot.)
      hint: |
        Sysmon shows the powershell.exe call invoking
        `[Activator]::CreateInstance(...)` on a specific ProgID.
      answer: REDACTED

