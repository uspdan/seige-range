# ATT&CK TA0003 — Persistence mini-campaign.
#
# After initial access, the attacker plants five different
# persistence mechanisms on WORK02. The hunter is given Sysmon
# + registry + scheduled-task + WMI subscription + BITS logs
# and must name each technique.

slug: tier-2-persistence
title: "Tier 2: Persistence"
description: |
  EDR caught a single foothold on WORK02 but the attacker had a
  window of about an hour before the host was isolated. Five
  separate persistence mechanisms were planted in that window —
  pick them apart from the logs.
category: Threat Hunting
team: blue
difficulty: 3
points: 400
tactic_id: TA0003
docker_port: 2222
profile: default-strict

techniques:
  - id: T1547.001
    description: |
      Registry Run Keys — backdoor binary registered under
      HKCU\Software\Microsoft\Windows\CurrentVersion\Run.
    question:
      prompt: |
        What registry value name did the attacker create under the
        Run key? (Just the value name, exact case.)
      hint: |
        registry_audit.log — RegistryValueSet events with
        TargetObject ending in `\Run\<name>`.

  - id: T1053.005
    description: |
      Scheduled Task — daily task that re-launches the backdoor at
      03:30 if killed.
    question:
      prompt: |
        What is the exact name of the scheduled task the attacker
        created? (As shown in scheduled_tasks.log.)
      hint: |
        Filter to action=create.

  - id: T1543.003
    description: |
      Windows Service — a SYSTEM service that auto-starts at boot
      and runs the backdoor binary.
    question:
      prompt: |
        What is the service name (not the display name) the
        attacker installed? (As shown in service_install.log.)
      hint: |
        Look for an install event with binPath pointing at a
        non-standard location like C:\ProgramData\…

  - id: T1546.003
    description: |
      Event Triggered Execution — WMI subscription that fires on
      a process-create matching REDACTED.
    question:
      prompt: |
        What is the name of the WMI EventConsumer the attacker
        registered? (As stored in WMI repository.)
      hint: |
        wmi_subscriptions.log — look for the consumer record paired
        with a __EventFilter and __FilterToConsumerBinding.

  - id: T1197
    description: |
      BITS Jobs — long-lived BITS download job pointing at attacker
      infrastructure that re-fetches the backdoor on a schedule.
    question:
      prompt: |
        What is the BITS job display name (DisplayName field)
        the attacker created? (Exact string.)
      hint: |
        bits_jobs.log — focus on the entry whose RemoteName host
        doesn't match any approved Microsoft / corp domain.

