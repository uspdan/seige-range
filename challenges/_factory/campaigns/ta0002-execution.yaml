# ATT&CK TA0002 — Execution mini-campaign.
#
# A single workstation (WKSTN-12) executes five different payload
# styles in twenty minutes. Sysmon + Windows event log + a small
# 4688 audit slice. Hunter identifies the technique pivots.

slug: tier-2-execution
title: "Tier 2: Execution"
description: |
  WKSTN-12 went from "user opened email" to "five execution
  techniques chained" in twenty minutes. Walk the Sysmon stream and
  the security event log to identify each pivot — every technique
  leaves a distinct argument shape, parent-child pair, or 4688 row.
category: Threat Hunting
team: blue
difficulty: 3
points: 400
flag: "CTF{REDACTED}"
tactic_id: TA0002
docker_port: 2222
profile: default-strict

techniques:
  - id: T1059.001
    description: |
      PowerShell — base64-encoded -EncodedCommand kicked off by a
      WMI subscription handler. The encoded blob decodes to a
      Net.WebClient downloader.
    question:
      prompt: |
        What URL does the decoded PowerShell -EncodedCommand pull
        its second stage from? (Full URL, including scheme.)
      hint: |
        Sysmon EventID 1 with `Image=powershell.exe` and an
        `-EncodedCommand` argument. Base64-decode the blob in the
        commandline.
      answer: REDACTED

  - id: T1059.003
    description: |
      Windows Command Shell — REDACTED /c chain piping curl into
      certutil for an HTA pull.
    question:
      prompt: |
        Which signed Windows binary does the REDACTED chain abuse
        to download the HTA? (Just the filename, e.g. foo.exe.)
      hint: |
        Look at the REDACTED /c argument string for a LOLBin used
        as an HTTP client.
      answer: REDACTED

  - id: T1053.005
    description: |
      Scheduled Task / Job — schtasks.exe creates a task running
      every 10 minutes as SYSTEM, action is a wscript on a .vbs in
      ProgramData.
    question:
      prompt: |
        What is the exact task name the attacker registered with
        schtasks /create? (Case-sensitive, as it appears after /tn.)
      hint: |
        4698 — A scheduled task was created. The TaskName field is
        what you want.
      answer: REDACTED

  - id: T1106
    description: |
      Native API — a small loader calls NtCreateThreadEx via
      ntdll.dll to start a thread inside lsass.exe. Sysmon
      EventID 8 (CreateRemoteThread) captures the source/target.
    question:
      prompt: |
        Which process injected a thread into lsass.exe via the
        Native API call? (Full image path as it appears in the
        Sysmon SourceImage field.)
      hint: |
        Sysmon EventID 8, TargetImage ends with `lsass.exe` — the
        SourceImage is the loader.
      answer: REDACTED

  - id: T1204.002
    description: |
      User Execution — Malicious File. User double-clicked a
      macro-laden .docm landed by the phishing payload. WINWORD.EXE
      becomes the parent of a powershell.exe with -nop -w hidden.
    question:
      prompt: |
        What filename did the user double-click to trigger the
        macro execution? (Filename only, no path.)
      hint: |
        Sysmon EventID 1 with ParentImage ending in `WINWORD.EXE`
        — the OriginalFileName or CommandLine of the parent points
        at the document.
      answer: REDACTED

