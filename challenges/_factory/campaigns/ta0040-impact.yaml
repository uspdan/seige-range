# ATT&CK TA0040 — Impact mini-campaign.

slug: tier-2-impact
title: "Tier 2: Impact"
description: |
  A ransomware-style operator went loud on five hosts in a single
  hour. Identify the impact technique used on each affected
  system from the available evidence.
category: Threat Hunting
team: blue
difficulty: 3
points: 450
flag: "CTF{REDACTED}"
tactic_id: TA0040
docker_port: 2222
profile: default-strict

techniques:
  - id: T1486
    description: |
      Data Encrypted for Impact — every file under /data is
      replaced with REDACTED extensions and a ransom note dropped.
    question:
      prompt: |
        What file extension is appended to encrypted files on
        host FILE-01? (Format: .ext, including the dot.)
      hint: |
        filesystem_changes.log — file creation events.
      answer: REDACTED

  - id: T1490
    description: |
      Inhibit System Recovery — vssadmin delete shadows /all /quiet.
    question:
      prompt: |
        Which Windows built-in did the attacker use to delete
        shadow copies on host BACKUP-2? (Filename, lowercase.)
      hint: |
        sysmon.json process_creation, command line includes
        `delete shadows`.
      answer: REDACTED

  - id: T1561.001
    description: |
      Disk Content Wipe — selective overwriting of high-value
      database directories on host DB-3.
    question:
      prompt: |
        What database directory on DB-3 was overwritten with
        random data? (Full path.)
      hint: |
        wipe_audit.log — look for the largest write of pattern
        `random` to a path under a database product folder.
      answer: REDACTED

  - id: T1485
    description: |
      Data Destruction — bulk delete of monthly accounting CSVs
      on host FINANCE-9.
    question:
      prompt: |
        How many files were deleted from FINANCE-9 in the bulk
        delete operation? (Just the integer.)
      hint: |
        deletion_audit.log — single user/process responsible
        for a count.
      answer: 187

  - id: T1531
    description: |
      Account Access Removal — attacker disables 12 admin accounts
      to hamper response on host AD-1.
    question:
      prompt: |
        How many admin accounts were disabled by the attacker
        on AD-1? (Just the integer.)
      hint: |
        ad_changes.log — EID 4725 (account disabled) events
        with the same actor.
      answer: 12

