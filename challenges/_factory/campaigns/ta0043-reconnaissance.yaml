# ATT&CK TA0043 — Reconnaissance mini-campaign.
#
# Pre-compromise. The "logs" the hunter sees are an after-action
# retrospective: WAF/edge access logs, a third-party passive-DNS
# feed dump, a CT-log search export, and a LinkedIn-scraping
# evidence bundle handed over by the threat-intel team. The
# adversary never touched an endpoint here — they were *learning*
# the target. Hunter reconstructs the recon footprint.

slug: tier-2-reconnaissance
title: "Tier 2: Reconnaissance"
description: |
  Two weeks before the intrusion, somebody spent five days quietly
  fingerprinting your perimeter, scraping employee directories,
  and pinging your public databases. Your TI team has handed over
  WAF logs, a passive-DNS slice, a LinkedIn-scrape evidence
  bundle, and a Shodan-style external-asset report. Walk them and
  identify the recon footprint.
category: Threat Hunting
team: blue
difficulty: 3
points: 400
tactic_id: TA0043
docker_port: 2222
profile: default-strict

techniques:
  - id: T1595.002
    description: |
      Active Scanning — Vulnerability Scanning. The adversary
      drove a Nuclei-style template scanner from a single
      cloud IP, hammering ~3000 distinct paths per minute with a
      recognisable user-agent.
    question:
      prompt: |
        What is the source IP that drove the bulk
        vulnerability-template scan? (Format x.x.x.x.)
      hint: |
        waf.log — sort by ip count; the obvious outlier has a
        user-agent containing the scanner name.

  - id: T1589.002
    description: |
      Gather Victim Identity Information — Email Addresses. A
      separate IP scraped LinkedIn and the corp `/about` /
      `/people` pages, harvesting a structured list of employees
      and email patterns.
    question:
      prompt: |
        Which email-address format did the scraper infer from
        the scrape? (Format string with `{first}` / `{last}`
        placeholders — e.g. `REDACTED`.)
      hint: |
        linkedin-scrape-evidence.json — the `inferred_email_pattern`
        field is right there.

  - id: T1592
    description: |
      Gather Victim Host Information. The same scanner IP later
      came back with low-and-slow asset-fingerprinting requests
      against specific endpoints, harvesting precise server
      version strings from response headers.
    question:
      prompt: |
        Which exact server-version string from your edge fleet
        ended up in the adversary's catalogue? (As it appears
        in the Server response header — verbatim.)
      hint: |
        waf.log — look at the `Server` header field for the
        records where the scanner IP probed `/` and the WAF
        passed them through.

  - id: T1591.001
    description: |
      Gather Victim Org Information — Determine Physical
      Locations. The scrape includes a separate enrichment pass
      hitting Google Maps and the corp careers page to map
      office locations and the headcount per site.
    question:
      prompt: |
        Which city did the adversary's enrichment pass identify
        as the company's primary engineering office? (City name
        only.)
      hint: |
        linkedin-scrape-evidence.json — the `primary_eng_site`
        block has a city field.

  - id: T1596.005
    description: |
      Search Open Technical Databases — Scan Databases. The
      adversary pulled the Shodan/Censys-equivalent report for
      every IP block your ASN advertises and flagged one host
      with an exposed admin panel from a stale staging deploy.
    question:
      prompt: |
        Which corp hostname did the external scan-database
        report flag as having an exposed admin panel? (Bare
        hostname, no scheme, as it appears in the asset report.)
      hint: |
        external-asset-report.json — the `flagged_assets` list
        has one entry with `exposure=admin_panel`.

