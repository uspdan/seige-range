# ATT&CK TA0042 — Resource Development mini-campaign.
#
# Pre-compromise, but visible. The adversary spun up the staging
# infra they'd use in the intrusion three weeks later. Hunter has
# WHOIS / RDAP records, certificate-transparency hits, a takedown
# vendor's social-impersonation report, and a VirusTotal-style
# tool-resolution dump. Job is to reconstruct the adversary's
# pre-built kit.

slug: tier-2-resource-development
title: "Tier 2: Resource Development"
description: |
  Three weeks before the incident, the adversary built out their
  staging kit in plain sight — registering lookalike domains,
  minting certificates, standing up impersonator accounts, and
  pre-staging a known offensive tool on a hosting provider. You
  have WHOIS/CT/social-impersonation/tool-intel exports. Walk
  them and identify each piece of pre-built infrastructure.
category: Threat Hunting
team: blue
difficulty: 3
points: 400
tactic_id: TA0042
docker_port: 2222
profile: default-strict

techniques:
  - id: T1583.001
    description: |
      Acquire Infrastructure — Domains. The adversary registered
      a lookalike of `example.com` using a homoglyph substitution
      through a registrar that doesn't enforce DNSSEC.
    question:
      prompt: |
        What is the homoglyph lookalike domain the adversary
        registered? (Bare domain, exactly as it appears in WHOIS.)
      hint: |
        whois-export.json — find the entry where
        `homoglyph_of=example.com`.

  - id: T1585.001
    description: |
      Establish Accounts — Social Media. A fresh LinkedIn profile
      claiming to be a recruiter at the target's HR vendor was
      created 18 days before the incident. The takedown vendor's
      report flagged it.
    question:
      prompt: |
        What is the handle (the LinkedIn username, the slug after
        `linkedin.com/in/`) of the impersonator-recruiter account?
      hint: |
        impersonation-report.json — `platform=linkedin`,
        `type=fabricated_persona`.

  - id: T1586.001
    description: |
      Compromise Accounts — Social Media. Distinct from the
      fabricated persona above: the adversary also took over a
      real but dormant Twitter/X account belonging to a
      well-followed industry analyst, using its reputation to
      seed a poisoned link.
    question:
      prompt: |
        What is the handle of the **compromised** (not fabricated)
        X/Twitter account the adversary now controls? (Without
        the `@`.)
      hint: |
        impersonation-report.json — `platform=x` and
        `type=account_takeover` (not `fabricated_persona`).

  - id: T1588.002
    description: |
      Obtain Capabilities — Tool. The tool-intel feed records a
      pre-staged payload — a known C2 implant — uploaded to a
      cloud-bucket URL by an actor cluster matching this
      adversary's TTPs. The implant SHA256 was correlated to a
      public family.
    question:
      prompt: |
        What is the SHA256 of the pre-staged tool the adversary
        uploaded? (64-char lowercase hex.)
      hint: |
        tool-intel-feed.json — the single entry with
        `confidence=high` and `cluster_match=true`.

  - id: T1608.001
    description: |
      Stage Capabilities — Upload Malware. The same implant
      shows up in a certificate-transparency hit: a Let's Encrypt
      cert was minted for a subdomain of the lookalike domain
      pointing at the payload host, eight days before delivery.
    question:
      prompt: |
        What is the FQDN that the adversary minted a Let's
        Encrypt certificate for, sitting on the lookalike domain?
        (Full hostname as it appears in the CT record.)
      hint: |
        ct-hits.json — find the issuer `Let's Encrypt` entry that
        chains to the lookalike domain from question 1.

