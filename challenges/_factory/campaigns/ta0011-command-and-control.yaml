# ATT&CK TA0011 — Command and Control mini-campaign.
#
# Five compromised hosts each beacon in a different way. Hunter
# walks pcap-extracted summaries, DNS query log, and proxy log
# to identify each technique.

slug: tier-2-command-and-control
title: "Tier 2: Command and Control"
description: |
  Five compromised hosts in five business units each picked a
  different way to talk to their handler. You have summarised pcap
  flow tables, DNS query logs, and a proxy log. Identify the C2
  technique used by each host.
category: Threat Hunting
team: blue
difficulty: 4
points: 500
tactic_id: TA0011
docker_port: 2222
profile: default-strict

techniques:
  - id: T1071.001
    description: |
      Web Protocols (HTTPS POST) — classic beacon, ~500 byte
      POSTs every 60 seconds to a cloud-fronted domain.
    question:
      prompt: |
        Which fully-qualified domain is HOST-A beaconing to? (Bare
        domain, no scheme.)
      hint: |
        flows.csv host=HOST-A — look for periodic ~500 byte POSTs
        with a regular cadence.

  - id: T1071.004
    description: |
      DNS Tunneling — HOST-B exfiltrates data inside subdomain
      labels of TXT queries to its own NS.
    question:
      prompt: |
        What is the second-level domain HOST-B is using for DNS
        tunnelling? (e.g. `dnsc2.example`.)
      hint: |
        dns_queries.log — many long subdomain labels under the
        same parent, all TXT records.

  - id: T1102.002
    description: |
      Bidirectional Communication via Web Service — HOST-C beacons
      via a public pastebin / GitHub Gist style service rather
      than a dedicated domain.
    question:
      prompt: |
        Which web-service host is HOST-C using for bidirectional
        comms? (Bare host name as it appears in the proxy log.)
      hint: |
        proxy.log — find the host with both GET and POST traffic
        from HOST-C where the user-agent isn't a normal browser.

  - id: T1573.002
    description: |
      Encrypted Channel — Asymmetric Crypto — HOST-D talks over
      a custom TLS that doesn't match common JA3 fingerprints.
    question:
      prompt: |
        What is the JA3 hash recorded for the suspicious TLS
        client HOST-D is using? (32-char hex string, lowercase.)
      hint: |
        flows.csv lines with host=HOST-D and proto=tls have a
        ja3 field. Cross-reference against the known-good list
        in known_good_ja3.txt — one JA3 isn't there.

  - id: T1090.002
    description: |
      External Proxy — HOST-E reaches the internet only through a
      single hop that itself sits at a residential ISP, with all
      C2 hops looking like normal HTTP through that proxy.
    question:
      prompt: |
        What is the residential IP HOST-E is using as its
        external proxy hop? (Format x.x.x.x.)
      hint: |
        flows.csv host=HOST-E — the only direct upstream IP
        outside the corp /16 range, and its rDNS resolves to
        a residential ISP block.

