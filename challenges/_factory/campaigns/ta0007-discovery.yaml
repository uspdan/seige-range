# ATT&CK TA0007 — Discovery mini-campaign.

slug: tier-2-discovery
title: "Tier 2: Discovery"
description: |
  The attacker landed quietly on SRVR-04 and spent twenty minutes
  mapping the environment before doing anything else. Reconstruct
  the discovery chain from a single Sysmon JSONL stream.
category: Threat Hunting
team: blue
difficulty: 2
points: 350
flag: "CTF{REDACTED}"
tactic_id: TA0007
docker_port: 2222
profile: default-strict

techniques:
  - id: T1018
    description: |
      Remote System Discovery — net view + nltest /dclist to map
      hosts and domain controllers.
    question:
      prompt: |
        Which built-in Windows binary did the attacker use to list
        the domain controllers? (Just the filename, e.g. foo.exe.)
      hint: |
        Look for arguments like /dclist.
      answer: REDACTED

  - id: T1083
    description: |
      File and Directory Discovery — recursive search for sensitive
      file extensions.
    question:
      prompt: |
        What file extension was the attacker hunting for in the
        recursive find? (Format: .ext, including the dot.)
      hint: |
        A dir /s or where invocation with a *.* pattern.
      answer: REDACTED

  - id: T1087.002
    description: |
      Domain Account Discovery — net group "REDACTED"
      enumeration.
    question:
      prompt: |
        What AD group did the attacker enumerate for membership?
        (Exact name as passed to net group, no quotes.)
      hint: |
        net group has the group name as its first argument.
      answer: REDACTED

  - id: T1057
    description: |
      Process Discovery — tasklist /v looking for AV/EDR processes.
    question:
      prompt: |
        Which AV/EDR product name appeared in the tasklist output
        the attacker dumped to disk? (Vendor product name as it
        shows in Image Name — lowercase, e.g. `REDACTED`.)
      hint: |
        Sysmon FileCreate of a .txt artefact; inside, look for
        any process from a known EDR vendor.
      answer: REDACTED

  - id: T1135
    description: |
      Network Share Discovery — net view \\hostname /all to
      enumerate shares.
    question:
      prompt: |
        Which remote hostname did the attacker enumerate shares on
        immediately before moving sideways? (Hostname only, no UNC,
        uppercase.)
      hint: |
        net view \\HOSTNAME /all.
      answer: REDACTED

