# Network Device Forensics — Palo Alto GlobalProtect abuse.
#
# A PAN-OS firewall's GlobalProtect portal has one auth profile
# missing MFA. The attacker brute-forced a VPN account against
# that profile, logged in, and pivoted to an internal subnet via
# an over-permissive policy. Hunter has the GlobalProtect portal
# log, a PAN-OS XML config excerpt, the traffic log post-VPN,
# and the system log.

slug: device-paloalto-vpn
title: "Device Forensics: GlobalProtect MFA Gap"
description: |
  FW-DC-01 (PA-3220, PAN-OS 10.2) had an auth-profile gap that
  let the attacker brute-force their way through GlobalProtect.
  Once on the VPN they crossed a policy they shouldn't have. The
  config, the GlobalProtect log, the post-VPN traffic log, and
  the system log are staged for you.
category: Network Device Forensics
team: blue
difficulty: 3
points: 450
tactic_id: DEVICE
docker_port: 2222
profile: default-strict

techniques:
  - id: T1556.006
    description: |
      Modify Authentication Process — Multi-Factor Authentication.
      One PAN-OS authentication-profile is missing the
      multi-factor-auth block, so users bound to that profile
      reach the VPN with password alone.
    question:
      prompt: |
        Which PAN-OS authentication profile name has no
        multi-factor-auth block configured? (Exact name as it
        appears in the XML.)
      hint: |
        config.xml — under `<authentication-profile>` look for an
        entry where the `<multi-factor-auth>` element is absent.

  - id: T1110
    description: |
      Brute Force — a single source IP launched a password-spray
      against the GlobalProtect portal targeting one VPN account.
    question:
      prompt: |
        From which source IP did the GlobalProtect password spray
        originate? (Format x.x.x.x.)
      hint: |
        globalprotect.log — count failed-login attempts by source
        IP. One IP has 200+ in a tight time window.

  - id: T1078
    description: |
      Valid Accounts — the spray eventually succeeded against one
      contractor VPN user who, per the auth-profile gap, isn't
      MFA-protected.
    question:
      prompt: |
        Which VPN username eventually logged in successfully after
        the brute force? (Lowercase username only, no domain.)
      hint: |
        globalprotect.log — same source IP as the previous
        question; status=auth-success.

  - id: T1021.001
    description: |
      Remote Services — Remote Desktop Protocol. Post-VPN the
      session pivoted via RDP to a Domain Controller in the
      internal management subnet.
    question:
      prompt: |
        What is the internal destination IP the attacker hit on
        TCP/3389 from the VPN tunnel? (Format x.x.x.x.)
      hint: |
        traffic.log — look for `app=ms-rdp` from the
        GlobalProtect tunnel subnet (172.21.x.x) into the
        management /24.

  - id: T1190
    description: |
      Exploit Public-Facing Application (policy abuse) — a single
      PAN-OS security rule allowed gp-users -> mgmt-net for any
      app/service, when the intent was "GP users to corp web
      apps only".
    question:
      prompt: |
        What is the name of the security rule that permitted the
        post-VPN pivot into the management subnet? (Exact rule
        name as it appears in the XML and the traffic log.)
      hint: |
        Cross-reference traffic.log's `rule=` field with the
        `<entry name="...">` in the rulebase section of
        config.xml.

