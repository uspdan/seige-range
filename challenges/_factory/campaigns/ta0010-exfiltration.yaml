# ATT&CK TA0010 — Exfiltration mini-campaign.

slug: tier-2-exfiltration
title: "Tier 2: Exfiltration"
description: |
  Same intrusion, five departments. The attacker tried five different
  exfiltration paths to get data out. Identify the technique used
  from each affected host.
category: Threat Hunting
team: blue
difficulty: 3
points: 450
flag: "CTF{REDACTED}"
tactic_id: TA0010
docker_port: 2222
profile: default-strict

techniques:
  - id: T1041
    description: |
      Exfiltration Over C2 Channel — the established HTTPS C2 also
      ferries out a 240 MB dump.
    question:
      prompt: |
        On host FINANCE-2 the C2 channel exfiltrated approximately
        how many MB? (Integer, no units.)
      hint: |
        proxy.log — sum bytes_out for the host's beacon domain.
        Spike from the usual ~500-byte beacon size is the giveaway.
      answer: 240

  - id: T1048.003
    description: |
      Exfiltration Over Alternative Protocol — DNS A queries with
      base32 payloads to a different external NS.
    question:
      prompt: |
        On host RND-7 which DNS record type is the attacker abusing
        for the alternative exfiltration channel? (Upper-case
        three-letter type, e.g. `TXT`.)
      hint: |
        dns_queries.log — RND-7's queries land on an unfamiliar
        SLD with a single record type repeated.
      answer: REDACTED

  - id: T1567.002
    description: |
      Exfiltration to Cloud Storage — aws s3 cp to an attacker
      bucket.
    question:
      prompt: |
        What is the AWS S3 bucket name the attacker uploaded to
        from host HR-3? (Just the bucket name, no s3:// prefix.)
      hint: |
        cli_history.log — search for aws s3 cp commands.
      answer: REDACTED

  - id: T1029
    description: |
      Scheduled Transfer — exfiltration happens only between 02:00
      and 03:00 UTC to blend with backup traffic.
    question:
      prompt: |
        Between which two UTC hours does the attacker schedule
        their daily exfiltration on host LEGAL-1? Answer as
        HH:MM-HH:MM in 24-hour format.
      hint: |
        timeline.log on LEGAL-1 — the exfil transfers all
        share an identical hour window.
      answer: REDACTED

  - id: T1020
    description: |
      Automated Exfiltration — a script wakes on file-create in a
      watched folder and ships every new doc straight to attacker
      infra without human input.
    question:
      prompt: |
        On host MARKETING-2 the automated exfiltration script
        monitors which folder for new files? (Full path as in
        watcher.log.)
      hint: |
        watcher.log — line with `watch_path=…` and `event=created`.
      answer: REDACTED

