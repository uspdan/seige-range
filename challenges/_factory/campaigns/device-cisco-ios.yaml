# Network Device Forensics — Cisco IOS edge router compromise.
#
# Attacker hit BR-EDGE-01 (a 2911 ISR running 15.7) via a weak
# SNMP RW community string, escalated to enable, dropped a
# privilege-15 user, modified an outbound ACL to permit C2, and
# stood up a GRE tunnel to their staging host. Hunter has the
# running-config, show users, syslog, and show snmp output.

slug: device-cisco-ios
title: "Device Forensics: Cisco IOS Compromise"
description: |
  BR-EDGE-01 (Cisco 2911, IOS 15.7) was compromised overnight.
  You have the post-incident running-config dump, terminal
  session log, syslog excerpt, and SNMP state. Five distinct
  bits of attacker tradecraft are visible. Find them.
category: Network Device Forensics
team: blue
difficulty: 3
points: 450
flag: "CTF{REDACTED}"
tactic_id: DEVICE
docker_port: 2222
profile: default-strict

techniques:
  - id: T1078
    description: |
      Valid Accounts — a rogue privilege-15 local user (not on the
      approved roster) appears in running-config.
    question:
      prompt: |
        What is the username of the rogue privilege-level-15 local
        account the attacker added? (Lowercase username only.)
      hint: |
        running-config.txt — look for `username ... privilege 15`
        entries and compare to /home/hunter/logs/approved-users.txt.
      answer: REDACTED

  - id: T1078.001
    description: |
      Default / weak credentials — an SNMP community string with
      RW (read-write) access set to a guessable value.
    question:
      prompt: |
        What is the SNMP community string configured with RW
        (read-write) access? (Exact string, case-sensitive.)
      hint: |
        running-config.txt and show-snmp.txt both name it. Look
        for `snmp-server community ... RW`.
      answer: REDACTED

  - id: T1133
    description: |
      External Remote Services — a GRE tunnel interface points at
      an attacker-controlled tunnel endpoint outside the org IP
      space.
    question:
      prompt: |
        What is the destination IP of the unauthorised GRE tunnel
        the attacker created on Tunnel0? (Format x.x.x.x.)
      hint: |
        running-config.txt — `interface Tunnel0` block, look at
        `tunnel destination`.
      answer: REDACTED

  - id: T1562.004
    description: |
      Impair Defenses — Disable or Modify System Firewall. The
      outbound ACL was edited to permit traffic to the attacker's
      C2 prefix that would otherwise have been dropped by the
      default deny-any.
    question:
      prompt: |
        Which ACL number was modified to permit outbound traffic
        to the attacker's C2 prefix? (Number only, e.g. 103.)
      hint: |
        running-config.txt — look for `access-list NNN permit ...
        198.51.100.0 0.0.0.255` (the C2 /24 the GRE points into).
      answer: 102

  - id: T1021.004
    description: |
      Remote Services — SSH. The attacker authenticated to vty 0 4
      from a single source IP across the change window.
    question:
      prompt: |
        From which source IP did the attacker authenticate to the
        vty over SSH for the privileged config changes? (Format
        x.x.x.x.)
      hint: |
        syslog.txt — multiple `%SEC_LOGIN-5-LOGIN_SUCCESS` lines
        from the same external IP into vty 0; show-users.txt
        confirms the live session.
      answer: REDACTED

