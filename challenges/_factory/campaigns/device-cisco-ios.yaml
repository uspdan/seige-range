    access-list 102 permit ip any host 8.8.8.8
    access-list 102 permit ip any host 1.1.1.1
    access-list 102 deny ip any any log
    !
    line vty 0 4
     transport input ssh
     login authentication default
    !
    ip http server
    ip http secure-server
    !
    end
