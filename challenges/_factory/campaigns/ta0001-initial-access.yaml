# ATT&CK TA0001 — Initial Access mini-campaign.
#
# Five distinct ways the attacker landed in five different
# environments. Hunter walks five log files, one per environment,
# and identifies the initial-access technique for each.

slug: tier-2-initial-access
title: "Tier 2: Initial Access"
description: |
  Five separate environments — corporate Office 365, a public web
  server, an SSO portal, a VPN gateway, and a software supply
  chain — each had one suspicious event in the last week. For
  each environment, identify which ATT&CK technique was used for
  initial access.
category: Threat Hunting
team: blue
difficulty: 3
points: 400
tactic_id: TA0001
docker_port: 2222
profile: default-strict

techniques:
  - id: T1566.001
    description: |
      Spearphishing Attachment — user opens malicious xlsm that
      spawns macro-driven powershell from Office.
    question:
      prompt: |
        In office365_audit.log, which user opened the malicious
        attachment that triggered the macro chain? (Just the
        UPN, e.g. user@corp.local.)
      hint: |
        Filter for MailItemsAccessed + WordOrExcelMacroEnabled.

  - id: T1190
    description: |
      Exploit Public-Facing Application — Log4Shell probe followed
      by reverse-shell pull from the JNDI server.
    question:
      prompt: |
        In webapp_access.log, which CVE was used to compromise
        the public web server? (Format: CVE-YYYY-NNNNN.)
      hint: |
        Look for an LDAP-protocol JNDI string in a User-Agent or
        header.

  - id: T1078
    description: |
      Valid Accounts — credential-stuffing into an SSO portal
      using a credential found in a recent dump.
    question:
      prompt: |
        In sso_auth.log, what country code does the successful
        login come from that should have triggered an impossible-
        travel alert? (Two-letter ISO code, uppercase.)
      hint: |
        Compare the successful logon with the user's other
        recent successful logons in the same file.

  - id: T1133
    description: |
      External Remote Services — VPN logon from an IP previously
      seen scanning multiple ports on the same gateway.
    question:
      prompt: |
        In vpn_gateway.log, what is the attacker source IP that
        successfully authenticated to the VPN after a port-scan
        burst? (Format: x.x.x.x.)
      hint: |
        The scan source and the successful logon share an IP.
        Look for repeated TCP RST on closed ports preceding the
        accepted login.

  - id: T1195.002
    description: |
      Supply Chain Compromise — a trusted update server pushed a
      backdoored package signed with a stolen cert.
    question:
      prompt: |
        In supply_chain.log, what is the SHA256 of the package
        that was distributed by the compromised update server?
        (Full hex string, lowercase.)
      hint: |
        The compromised update server is the *only* upstream that
        flipped its signing identity between consecutive
        publishes.

