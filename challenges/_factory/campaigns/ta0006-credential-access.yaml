# ATT&CK TA0006 — Credential Access mini-campaign.
#
# Attacker on WORKSTN-7 dumps credentials five different ways
# over a 90-minute window. Hunter pieces together which
# technique each artefact represents.

slug: tier-2-credential-access
title: "Tier 2: Credential Access"
description: |
  An EDR detection on WORKSTN-7 produced five separate alerts in a
  90-minute window — all credential-related. You have Sysmon,
  AD authentication, and disk-IO artefacts. For each alert,
  identify the credential-access technique.
category: Threat Hunting
team: blue
difficulty: 4
points: 500
flag: "CTF{REDACTED}"
tactic_id: TA0006
docker_port: 2222
profile: default-strict

techniques:
  - id: T1003.001
    description: |
      LSASS Memory dump using procdump.exe -ma lsass.exe.
    question:
      prompt: |
        What is the name of the .dmp file the attacker wrote
        when dumping LSASS? (Filename only.)
      hint: |
        Sysmon EID 11 FileCreate events with TargetFilename
        ending in `.dmp`.
      answer: REDACTED

  - id: T1558.003
    description: |
      Kerberoasting — request service tickets (TGS) for accounts
      with SPNs and crack them offline.
    question:
      prompt: |
        What encryption type did the attacker request the TGS
        with to enable offline cracking? (Format: rc4 or aes,
        followed by the bit size, e.g. `REDACTED` or `aes256`.)
      hint: |
        Domain Controller 4769 events show
        TicketEncryptionType. The weak/legacy choice is the
        one to flag.
      answer: REDACTED

  - id: T1003.006
    description: |
      DCSync — attacker abuses replication rights to pull NTLM
      hashes directly from a DC.
    question:
      prompt: |
        Which compromised user account performed the DCSync
        replication request against DC01? (UPN, e.g.
        user@corp.local.)
      hint: |
        DC security log — EID REDACTED with object access including
        the DS-Replication-Get-Changes-All right. The account
        won't be a real domain admin.
      answer: REDACTED

  - id: T1555.003
    description: |
      Credentials from Web Browsers — attacker copies Chrome's
      Login Data SQLite DB out of the user profile.
    question:
      prompt: |
        Which full file path did the attacker read out of the
        Chrome user data directory? (As shown in sysmon.json.)
      hint: |
        Sysmon EID 1 — process_creation events with a child
        process touching `\Google\Chrome\User Data\Default\`.
      answer: REDACTED

  - id: T1552.004
    description: |
      Private Keys — attacker greps the disk for *.pem / *.key
      / *.pfx and exfiltrates the first PFX they find.
    question:
      prompt: |
        What is the filename of the PFX file the attacker
        accessed? (Filename only, with extension.)
      hint: |
        Sysmon EID 11 FileCreate isn't enough — look for
        FileAccess (EID 12 / 13) events for .pfx extensions.
      answer: REDACTED

