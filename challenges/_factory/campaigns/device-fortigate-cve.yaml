# Network Device Forensics — FortiGate CVE-2022-40684 style abuse.
#
# Attacker exploited a Forwarded-header authentication bypass on
# FGT-PERIM-02's admin interface to add a new super_admin user,
# then logged in normally and reconfigured the SSL-VPN portal.
# Hunter has the HTTPS admin access log, the system event log,
# a config diff between yesterday's backup and current state,
# and the admin event log.

slug: device-fortigate-cve
title: "Device Forensics: FortiGate Auth Bypass"
description: |
  FGT-PERIM-02 (FortiGate 100F, FortiOS 7.2.4) shipped a config
  change at 02:11 UTC last night that nobody on the team owns up
  to. The HTTPS admin access log, system event log, and a config
  diff are staged for you. Reconstruct exactly how the attacker
  got in, who they became, and what they changed.
category: Network Device Forensics
team: blue
difficulty: 4
points: 500
flag: "CTF{REDACTED}"
tactic_id: DEVICE
docker_port: 2222
profile: default-strict

techniques:
  - id: T1190
    description: |
      Exploit Public-Facing Application — the auth bypass exploits
      a request where a specific Forwarded `for=` value tricks the
      backend into treating the call as a local trusted request.
    question:
      prompt: |
        What value did the attacker put in the `Forwarded:` header's
        `for=` parameter to trigger the auth bypass? (Exact value
        as it appears after `for=` and before the next semicolon
        or end of header.)
      hint: |
        admin-https.log — requests with `Forwarded: for=...;
        by=...` immediately before the rogue admin appears. The
        canonical CVE-2022-40684 trick uses a specific local-looking
        identity here.
      answer: "REDACTED"

  - id: T1078.003
    description: |
      Valid Accounts — Local Accounts. The attacker created a new
      super_admin local user via the bypassed API.
    question:
      prompt: |
        What is the username of the rogue super_admin account
        added during the bypass window? (Lowercase, as it appears
        in the config diff.)
      hint: |
        config-diff.txt — the `+config system admin / + edit ...`
        block. The legitimate roster (in approved-admins.txt) does
        not contain it.
      answer: REDACTED

  - id: T1556
    description: |
      Modify Authentication Process — the attacker disabled
      trusted-host enforcement on their new admin, allowing it to
      log in from anywhere.
    question:
      prompt: |
        Which FortiOS admin profile setting did the attacker leave
        unrestricted on the rogue account so it would accept
        logins from any source IP? (Exact CLI config keyword.)
      hint: |
        config-diff.txt for that account — look for the absence /
        wildcard of `REDACTED`.
      answer: REDACTED

  - id: T1098
    description: |
      Account Manipulation — after the rogue admin existed, they
      modified the SSL-VPN portal config to add a wildcard split-
      tunnel route that exposes the internal management subnet.
    question:
      prompt: |
        Which CIDR was added to the SSL-VPN portal's split-tunnel
        routing-address list to expose the internal management
        subnet? (Format x.x.x.x/yy.)
      hint: |
        config-diff.txt — within `config vpn ssl web portal / edit
        full-access`, look for the new entry under
        `set split-tunneling-routing-address` or a referenced
        firewall address group.
      answer: REDACTED

  - id: T1078
    description: |
      Valid Accounts (post-create login) — the attacker, having
      added the admin, immediately logged in via the GUI.
    question:
      prompt: |
        What is the source IP from which the rogue admin
        subsequently authenticated via the web GUI? (Format x.x.x.x.)
      hint: |
        system-event.log — `event=login` with `status=success`
        and the new username from the previous question.
      answer: REDACTED

