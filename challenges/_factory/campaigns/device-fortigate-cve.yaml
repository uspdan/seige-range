    2026-05-15T02:09:02Z src=REDACTED method=PUT  uri=/api/v2/cmdb/system/admin/REDACTED status=200 ua="Node.js" headers="Forwarded: for=REDACTED;by=REDACTED"
    2026-05-15T02:11:14Z src=REDACTED method=POST uri=/logincheck status=302 ua="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36"
    2026-05-15T02:11:14Z src=REDACTED method=GET  uri=/ng/dashboard status=200 ua="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36"
