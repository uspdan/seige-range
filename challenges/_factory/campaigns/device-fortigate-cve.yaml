    2026-05-15T02:09:01Z logid=0100032003 type=event subtype=system level=notice  logdesc="Object added" action=add user="api" cfgobj="system.admin REDACTED"
    2026-05-15T02:11:14Z logid=0100032001 type=event subtype=system level=notice  logdesc="Admin login successful" action=login status=success user="REDACTED" srcip=REDACTED ui="https" reason="passwd"
    2026-05-15T02:14:22Z logid=0100032004 type=event subtype=system level=notice  logdesc="Object attribute changed" action=edit user="REDACTED" cfgobj="vpn.ssl.web.portal full-access"
  config-diff.txt: |
    # Diff between FGT-PERIM-02-config-2026-05-14.conf (baseline) and
    # FGT-PERIM-02-config-2026-05-15.conf (post-incident).
    @@ config system admin
    +    edit "REDACTED"
    +        set accprofile "super_admin"
    +        set vdom "root"
    +        set password ENC SH2redacted
    +    next
     end
    @@ config vpn ssl web portal
         edit "full-access"
             set tunnel-mode enable
             set split-tunneling enable
    +        set split-tunneling-routing-address "INTERNAL-MGMT"
         next
     end
    @@ config firewall address
    +    edit "INTERNAL-MGMT"
    +        set subnet 10.250.0.0 255.255.255.0
    +    next
     end
  approved-admins.txt: |
