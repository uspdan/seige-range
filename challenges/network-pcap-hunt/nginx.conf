server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /capture.pcap {
        add_header Content-Disposition 'attachment; filename="capture.pcap"';
        add_header Content-Type application/octet-stream;
    }
}
