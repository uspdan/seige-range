[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bluerange-spec"
version = "1.0.0"
description = "Challenge manifest schema for the seige-range / bluerange platform."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "seige-range maintainers" }]
keywords = ["ctf", "challenge", "manifest", "blueteam"]

dependencies = [
    "pydantic>=2.6,<3",
    "PyYAML>=6.0,<7",
]

[project.optional-dependencies]
testing = [
    "pytest>=8,<9",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
bluerange_spec = ["schemas/*.json"]
